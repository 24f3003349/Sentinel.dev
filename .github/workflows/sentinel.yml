name: Sentinel chaos gate

on:
  pull_request:
  workflow_dispatch:
    inputs:
      target:
        description: Intentional demo target to validate
        default: race_condition
        type: choice
        options: [race_condition, memory_leak, redos_attack]

jobs:
  survivability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: uv sync --all-extras --frozen
      - run: uv run pytest
      # This intentionally exits 1 when Sentinel proves a vulnerability. It is
      # the failed CI check a PR/Codex workflow consumes.
      - name: Sentinel survivability gate
        run: uv run python -m sentinel.cli attack dummy_targets/${{ inputs.target || 'race_condition' }} --no-patch
